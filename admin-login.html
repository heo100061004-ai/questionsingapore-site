<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question Singapore - 관리자 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #eef2fb 0%, #e8eef9 100%);
        padding: 24px;
      }

      .login-panel {
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 48px 40px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 10px 40px rgba(17, 31, 59, 0.12);
      }

      .login-panel h1 {
        margin: 0 0 8px;
        font-size: 28px;
        color: var(--primary);
      }

      .login-panel p {
        margin: 0 0 32px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .login-form {
        display: grid;
        gap: 20px;
      }

      .login-form label {
        display: grid;
        gap: 8px;
        font-weight: 500;
        color: var(--text);
      }

      .login-form input {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        color: var(--text);
      }

      .login-form input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(17, 31, 59, 0.08);
      }

      .login-form button {
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 12px;
      }

      .login-form button:hover {
        background: var(--primary-strong);
      }

      .login-error {
        color: #d32f2f;
        font-size: 0.9rem;
        padding: 12px;
        background: #ffebee;
        border-radius: 8px;
        margin-bottom: 16px;
        display: none;
      }

      .login-back {
        text-align: center;
        margin-top: 24px;
      }

      .login-back a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-panel">
        <h1>관리자 로그인</h1>
        <p>관리자 계정으로 로그인하세요.</p>

        <div class="login-error" id="error-msg"></div>

        <form class="login-form" id="login-form">
          <label>
            이메일
            <input type="email" id="email" name="email" placeholder="admin@example.com" required />
          </label>
          <label>
            비밀번호
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </label>
          <button type="submit">로그인</button>
        </form>

        <div class="login-back">
          <a href="index.html">홈으로 돌아가기</a>
        </div>
      </div>
    </div>

    <script>
    const ADMIN_EMAIL = 'hello@questionsingapore.com';
    const ADMIN_PASSWORD = 'Eyes030!';

      document.getElementById('login-form').addEventListener('submit', (event) => {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('error-msg');

        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
          sessionStorage.setItem('admin-authorized', 'true');
          window.location.href = 'admin.html';
        } else {
          errorMsg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
          errorMsg.style.display = 'block';
        }
      });
    </script>
  </body>
</html>
